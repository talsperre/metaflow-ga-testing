# Tox configuration for metaflow-ga-testing
# Run: tox -e local  (or kubernetes, argo)
# Merge results: tox -e local && python merge_results.py
# Full run: tox -e local && tox -e kubernetes && tox -e argo && python merge_results.py

[tox]
envlist = local, kubernetes, argo
minversion = 4.0

[testenv]
deps =
    metaflow
    pytest
    pytest-xdist
passenv =
    METAFLOW_HOME
    METAFLOW_PROFILE
    METAFLOW_SERVICE_URL
    METAFLOW_DEFAULT_DATASTORE
    METAFLOW_DATASTORE_SYSROOT_S3
    METAFLOW_KUBERNETES_NAMESPACE
    METAFLOW_KUBERNETES_SECRETS
    METAFLOW_SERVICE_INTERNAL_URL
    AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY
    AWS_ENDPOINT_URL_S3
    AWS_CONFIG_FILE
    HOME
    USER
usedevelop = true
changedir = {toxinidir}

[testenv:local]
commands =
    pytest --pyargs metaflow_qa_tests.basic -v --junitxml=test-results/local.xml {posargs}
description = Run local backend tests (no infrastructure)

[testenv:kubernetes]
deps =
    {[testenv]deps}
    kubernetes
commands =
    pytest --pyargs metaflow_qa_tests.kubernetes -v --junitxml=test-results/kubernetes.xml {posargs}
description = Run Kubernetes backend tests (requires dev stack)

[testenv:argo]
deps =
    {[testenv]deps}
    kubernetes
commands =
    pytest --pyargs metaflow_qa_tests.argo_workflows -v --junitxml=test-results/argo.xml {posargs}
description = Run Argo Workflows backend tests (requires dev stack)
